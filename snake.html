<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #040406;
            cursor: default; 
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }
        
        /* Glassmorphic UI Overlays */
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(4, 4, 6, 0.6);
            backdrop-filter: blur(8px);
            color: #fff;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        
        .ui-box {
            background: rgba(15, 15, 30, 0.85);
            border: 1px solid rgba(0, 255, 200, 0.2);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            max-width: 450px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #00ffc8;
            text-shadow: 0 0 10px rgba(0,255,200,0.3);
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nickname-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .nickname-input:focus {
            border-color: #00ffc8;
        }

        /* Difficulty Buttons */
        .diff-btn {
            flex: 1; 
            padding: 10px 5px; 
            font-size: 12px; 
            font-weight: bold;
            text-transform: uppercase;
            background: transparent; 
            border: 1px solid rgba(255,255,255,0.2); 
            color: rgba(255,255,255,0.7); 
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .diff-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .diff-btn.active-diff {
            background: linear-gradient(135deg, #00ffc8, #00b3ff);
            color: #040406;
            border: none;
            box-shadow: 0 2px 10px rgba(0,255,200,0.3);
        }

        .color-config {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .picker-set {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 60px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        button.primary-btn {
            width: 100%;
            background: linear-gradient(135deg, #00ffc8, #00b3ff);
            border: none;
            padding: 14px 35px;
            color: #040406;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,255,200,0.3);
            font-size: 15px;
        }
        button.primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,255,200,0.5);
        }

        .secondary-btn {
            width: 100%;
            padding: 14px 35px;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            box-shadow: none;
        }
        .secondary-btn:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-color: rgba(255,255,255,0.4);
        }

        /* Settings CSS Toggle Switch */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }
        .setting-row span {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .3s;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #00ffc8;
            border-color: #00ffc8;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: #040406;
        }

        /* HUD Tracker */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 5;
            color: rgba(255,255,255,0.8);
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            background: rgba(10,10,15,0.6);
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
            display: none;
        }

        /* Top Right Leaderboard */
        .leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 5;
            color: rgba(255,255,255,0.85);
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            background: rgba(10, 10, 15, 0.75);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 200, 0.2);
            width: 220px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            pointer-events: none;
            display: none;
        }
        .leaderboard h3 {
            color: #00ffc8;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .leaderboard-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .leaderboard-item.player-row {
            color: #00ffc8;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 200, 0.4);
        }
        .leaderboard-item .rank {
            opacity: 0.5;
            margin-right: 6px;
            font-weight: normal;
        }
        .leaderboard-item .name {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        .leaderboard-item .score {
            font-weight: bold;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="hud" id="gameHud">Score: 45 | Width Tier: 1 | Enemies: 5</div>
    
    <div class="leaderboard" id="gameLeaderboard">
        <h3 id="leaderboardTitle">Leaderboard</h3>
        <ul class="leaderboard-list" id="leaderboardList"></ul>
    </div>

    <div class="screen-overlay" id="mainMenu">
        <div class="ui-box">
            <h1>Snake Arena</h1>
            
            <div class="input-group">
                <label for="nickname">Nickname</label>
                <input type="text" id="nickname" class="nickname-input" value="Player" maxlength="12">
            </div>

            <div class="input-group">
                <label>Arena Mode</label>
                <div style="display: flex; gap: 10px; margin-top: 2px;">
                    <button id="modeDefaultBtn" type="button" class="diff-btn active-diff">Default</button>
                    <button id="modeTronBtn" type="button" class="diff-btn">Tron</button>
                </div>
            </div>

            <div class="input-group">
                <label>Bot Difficulty</label>
                <div style="display: flex; gap: 5px; margin-top: 2px;">
                    <button id="diffEasyBtn" type="button" class="diff-btn" data-diff="EASY">Easy</button>
                    <button id="diffMedBtn" type="button" class="diff-btn" data-diff="MEDIUM">Med</button>
                    <button id="diffHardBtn" type="button" class="diff-btn active-diff" data-diff="HARD">Hard</button>
                    <button id="diffExpBtn" type="button" class="diff-btn" data-diff="EXPERT">Expert</button>
                </div>
            </div>

            <div class="input-group">
                <label for="lanIp">LAN Server IP</label>
                <input type="text" id="lanIp" class="nickname-input" value="localhost:3000" placeholder="e.g. 192.168.1.50:3000">
            </div>

            <div class="color-config">
                <div class="picker-set">
                    <label>Head Color</label>
                    <input type="color" id="headColor" value="#00ffc8">
                </div>
                <div class="picker-set">
                    <label>Tail Color</label>
                    <input type="color" id="tailColor" value="#8000ff">
                </div>
            </div>
            <button id="startBtn" class="primary-btn">Play Solo</button>
            <button id="lanBtn" class="primary-btn" style="background: linear-gradient(135deg, #00b3ff, #8000ff); box-shadow: 0 4px 15px rgba(0,179,255,0.3);">Connect LAN</button>
            <button class="secondary-btn settingsOpenBtn">Settings</button>
        </div>
    </div>

    <div class="screen-overlay hidden" id="deathScreen">
        <div class="ui-box" style="border-color: rgba(255, 50, 50, 0.3);">
            <h1 style="color: #ff3232; text-shadow: 0 0 10px rgba(255,50,50,0.3);">Game Over</h1>
            <p style="font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 10px;" id="deathStats">Final Score: 0</p>
            <button id="respawnBtn" class="primary-btn" style="background: linear-gradient(135deg, #ff3232, #ff7600); box-shadow: 0 4px 15px rgba(255,50,50,0.3);">Play Again</button>
            <button id="backToMenuBtn" class="secondary-btn">Main Menu</button>
            <button class="secondary-btn settingsOpenBtn">Settings</button>
        </div>
    </div>

    <div class="screen-overlay hidden" id="settingsMenu">
        <div class="ui-box">
            <h1>Configuration</h1>
            
            <div class="setting-row">
                <span>Motion Blur Trail Effect</span>
                <label class="switch">
                    <input type="checkbox" id="blurToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-row">
                <span>Ultra Optimization (White Bots, No Shadows)</span>
                <label class="switch">
                    <input type="checkbox" id="ultraOptToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <button id="settingsCloseBtn" class="primary-btn" style="margin-top: 15px;">Back</button>
        </div>
    </div>

    <canvas id="snakeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'MENU';
        let priorSettingsState = 'MENU';
        let currentGamemode = 'DEFAULT'; 
        let currentDifficulty = 'HARD';

        // UI Selectors
        const menuOverlay = document.getElementById('mainMenu');
        const deathOverlay = document.getElementById('deathScreen');
        const settingsOverlay = document.getElementById('settingsMenu');
        const gameHud = document.getElementById('gameHud');
        const gameLeaderboard = document.getElementById('gameLeaderboard');
        const leaderboardList = document.getElementById('leaderboardList');
        const leaderboardTitle = document.getElementById('leaderboardTitle');
        const deathStats = document.getElementById('deathStats');
        const blurToggle = document.getElementById('blurToggle');
        const ultraOptToggle = document.getElementById('ultraOptToggle');
        const modeDefaultBtn = document.getElementById('modeDefaultBtn');
        const modeTronBtn = document.getElementById('modeTronBtn');
        const lanIpInput = document.getElementById('lanIp');

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const mouse = { x: (window.innerWidth * (window.devicePixelRatio || 1)) / 2, y: (window.innerHeight * (window.devicePixelRatio || 1)) / 2 };
        window.addEventListener('mousemove', (e) => { 
            const currentDpr = window.devicePixelRatio || 1;
            mouse.x = e.clientX * currentDpr; 
            mouse.y = e.clientY * currentDpr; 
        });

        const hardwareInput = { boost: false };
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Shift') hardwareInput.boost = true;
            if (gameState === 'PLAYING' && player && currentGamemode === 'TRON') {
                const key = e.key.toLowerCase();
                if ((key === 'w' || key === 'arrowup') && player.currentDirection !== 'DOWN') player.nextDirection = 'UP';
                if ((key === 's' || key === 'arrowdown') && player.currentDirection !== 'UP') player.nextDirection = 'DOWN';
                if ((key === 'a' || key === 'arrowleft') && player.currentDirection !== 'RIGHT') player.nextDirection = 'LEFT';
                if ((key === 'd' || key === 'arrowright') && player.currentDirection !== 'LEFT') player.nextDirection = 'RIGHT';
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'Shift') hardwareInput.boost = false;
        });
        window.addEventListener('mousedown', (e) => {
            if (gameState === 'PLAYING') hardwareInput.boost = true;
        });
        window.addEventListener('mouseup', (e) => {
            hardwareInput.boost = false;
        });

        const config = {
            segmentLength: 12,
            baseRadius: 16,
            maxNPCs: 14, 
            hexSize: 45,
            maxPassiveOrbs: 90,
            mapWidth: 2500,  
            mapHeight: 2500, 
            minSegments: 15,
            motionBlur: false, 
            spawnProtectionDuration: 2000,
            ultraOptimization: false
        };

        let particles = [];
        let orbs = [];
        let snakes = [];
        let player = null;
        let lastScoreDrainTime = Date.now();
        let camera = { x: 0, y: 0 };
        let logicalScale = 1; 

        let socket = null;
        let isMultiplayerMode = false;
        let myNetworkId = null;

        const npcNames = ['Viper', 'Shadow', 'Cobra', 'Titan', 'Ghost', 'Blaze', 'Frost', 'Neon', 'Apex', 'Striker'];

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 255, b: 200 };
        }
        function randomRGB() {
            return { r: Math.floor(Math.random()*180+75), g: Math.floor(Math.random()*180+75), b: Math.floor(Math.random()*180+75) };
        }

        function spawnParticles(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 3 + 1,
                    color: color,
                    alpha: 1
                });
            }
        }

        function dropOrbsFromDeath(snake) {
            snake.segments.forEach((seg, index) => {
                if (index % 6 === 0) {
                    const progress = index / snake.segments.length;
                    const r = Math.round(snake.startRGB.r + (snake.endRGB.r - snake.startRGB.r) * progress);
                    const g = Math.round(snake.startRGB.g + (snake.endRGB.g - snake.startRGB.g) * progress);
                    const b = Math.round(snake.startRGB.b + (snake.endRGB.b - snake.startRGB.b) * progress);
                    
                    orbs.push({
                        x: seg.x + (Math.random() - 0.5) * 20,
                        y: seg.y + (Math.random() - 0.5) * 20,
                        radius: Math.random() * 2 + 6, 
                        color: `rgb(${r}, ${g}, ${b})`,
                        growthValue: currentGamemode === 'TRON' ? 1 : 3 
                    });
                }
            });
        }

        function maintainPassiveOrbs() {
            while (orbs.length < config.maxPassiveOrbs) {
                orbs.push({
                    x: Math.random() * config.mapWidth,
                    y: Math.random() * config.mapHeight,
                    radius: Math.random() * 2 + 3,
                    color: currentGamemode === 'TRON' ? `hsl(320, 100%, 65%)` : `hsl(${Math.random() * 360}, 100%, 65%)`,
                    growthValue: 1
                });
            }
        }

        function drawArenaBoundaries() {
            ctx.save();
            ctx.strokeStyle = config.ultraOptimization ? '#ffffff' : (currentGamemode === 'TRON' ? '#ff006e' : '#ff3333');
            ctx.lineWidth = 8;
            if (!config.ultraOptimization) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = currentGamemode === 'TRON' ? '#ff006e' : '#ff3333';
            }
            ctx.strokeRect(0 - camera.x, 0 - camera.y, config.mapWidth, config.mapHeight);
            ctx.restore();
        }

        function drawHexGrid() {
            if (config.ultraOptimization && currentGamemode !== 'TRON') return;

            const time = Date.now() * 0.001;
            const h = config.hexSize;
            const rowHeight = h * 1.5;
            const colWidth = h * Math.sqrt(3);

            ctx.save();
            ctx.lineWidth = 1;

            let logicCamY = camera.y;
            let logicCamX = camera.x;
            let viewportW = canvas.width / logicalScale;
            let viewportH = canvas.height / logicalScale;

            for (let y = Math.floor(logicCamY / rowHeight) * rowHeight - h; y < logicCamY + viewportH + h; y += rowHeight) {
                if (y < 0 || y > config.mapHeight) continue;
                for (let x = Math.floor(logicCamX / colWidth) * colWidth - colWidth; x < logicCamX + viewportW + colWidth; x += colWidth) {
                    if (x < 0 || x > config.mapWidth) continue;
                    
                    if (currentGamemode === 'TRON') {
                        ctx.strokeStyle = `rgba(255, 0, 110, 0.04)`;
                        ctx.strokeRect(x - camera.x, y - camera.y, colWidth, rowHeight);
                    } else {
                        const noise = Math.sin(x * 0.005 + time) * Math.cos(y * 0.005 + time * 0.8);
                        const opacity = 0.015 + (noise + 1) * 0.03; 
                        ctx.strokeStyle = `rgba(0, 255, 200, ${opacity})`;
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            const angle = (Math.PI / 3) * i + Math.PI / 6;
                            const hx = x + h * Math.cos(angle) - camera.x;
                            const hy = y + h * Math.sin(angle) - camera.y;
                            if (i === 0) ctx.moveTo(hx, hy);
                            else ctx.lineTo(hx, hy);
                        }
                        ctx.closePath();
                        ctx.stroke();
                    }
                }
            }
            ctx.restore();
        }

        function drawMinimap() {
            const size = 160;
            const pad = 20;
            
            let logicW = canvas.width / logicalScale;
            let logicH = canvas.height / logicalScale;
            
            const mx = logicW - size - pad;
            const my = logicH - size - pad;

            ctx.save();
            ctx.fillStyle = 'rgba(10, 10, 18, 0.8)';
            ctx.strokeStyle = currentGamemode === 'TRON' ? 'rgba(255, 0, 110, 0.25)' : 'rgba(0, 255, 200, 0.25)';
            ctx.lineWidth = 2;
            ctx.fillRect(mx, my, size, size);
            ctx.strokeRect(mx, my, size, size);

            const scale = size / config.mapWidth;

            snakes.forEach(s => {
                if (s.segments.length === 0) return;
                if (s.isProtected() && Math.floor(Date.now() / 150) % 2 === 0) return;

                ctx.fillStyle = s.isPlayer ? (currentGamemode === 'TRON' ? '#ff006e' : '#00ffc8') : '#ff3333';
                if (config.ultraOptimization && !s.isPlayer) ctx.fillStyle = '#ffffff';

                const dotX = mx + (s.segments[0].x * scale);
                const dotY = my + (s.segments[0].y * scale);
                
                ctx.beginPath();
                ctx.arc(dotX, dotY, s.isPlayer ? 3.5 : 2, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function updateLeaderboard() {
            if (gameState !== 'PLAYING') {
                gameLeaderboard.style.display = 'none';
                return;
            }
            gameLeaderboard.style.display = 'block';
            leaderboardTitle.innerText = currentGamemode === 'TRON' ? 'Top 10 (Tron)' : 'Top 10 (Default)';

            const sorted = [...snakes].sort((a, b) => b.segments.length - a.segments.length);
            leaderboardList.innerHTML = '';

            const top10 = sorted.slice(0, 10);
            top10.forEach((snake, idx) => {
                const li = document.createElement('li');
                li.className = 'leaderboard-item' + (snake.isPlayer ? ' player-row' : '');
                
                const rank = document.createElement('span');
                rank.className = 'rank';
                rank.innerText = `${idx + 1}.`;

                const name = document.createElement('span');
                name.className = 'name';
                name.innerText = snake.name;

                const score = document.createElement('span');
                score.className = 'score';
                score.innerText = snake.segments.length;

                li.appendChild(rank);
                li.appendChild(name);
                li.appendChild(score);
                leaderboardList.appendChild(li);
            });
        }

        class Snake {
            constructor(x, y, isPlayer = false, name = "Bot") {
                this.isPlayer = isPlayer;
                this.name = name;
                this.totalSegments = currentGamemode === 'TRON' ? 60 : 45;
                this.segments = [];
                this.baseRadius = config.baseRadius;
                this.isBoosting = false;
                this.actuallyBoosting = false;
                this.lastBoostDrainTime = Date.now();
                this.virtualCursor = { x: x, y: y };
                this.wanderTarget = { x: Math.random() * (config.mapWidth - 400) + 200, y: Math.random() * (config.mapHeight - 400) + 200 };
                this.startRGB = randomRGB();
                this.endRGB = randomRGB();
                this.spawnTime = Date.now();
                this.isNetworkRemote = false;
                this.networkId = null;
                this.currentDirection = 'RIGHT';
                this.nextDirection = 'RIGHT';

                let initialAngle = 0;
                for (let i = 0; i < this.totalSegments; i++) {
                    this.segments.push({
                        x: x - (i * (currentGamemode === 'TRON' ? 4 : config.segmentLength)),
                        y: y,
                        angle: initialAngle
                    });
                }
            }

            isProtected() {
                return (Date.now() - this.spawnTime) < config.spawnProtectionDuration;
            }

            updateAI(allSnakes) {
                if (this.isPlayer || this.isNetworkRemote) return;
                if (currentGamemode === 'TRON') {
                    this.updateTronAI(allSnakes);
                    return;
                }

                let head = this.segments[0];
                let steerX = this.wanderTarget.x;
                let steerY = this.wanderTarget.y;
                this.isBoosting = false;

                const safetyZone = 160;
                if (head.x < safetyZone || head.x > config.mapWidth - safetyZone || head.y < safetyZone || head.y > config.mapHeight - safetyZone) {
                    this.virtualCursor.x = config.mapWidth / 2;
                    this.virtualCursor.y = config.mapHeight / 2;
                    this.isBoosting = currentDifficulty !== 'EASY';
                    return;
                }

                let targetSnake = null;
                let closestDist = 1500;
                let maxAggroDist = 650;
                let evasionDist = 110;

                if (currentDifficulty === 'EASY') maxAggroDist = 0;
                else if (currentDifficulty === 'MEDIUM') maxAggroDist = 200;
                else if (currentDifficulty === 'EXPERT') {
                    maxAggroDist = 1000;
                    evasionDist = 150;
                }

                allSnakes.forEach(s => {
                    if (s !== this && s.segments.length > 0 && !this.isProtected() && !s.isProtected()) {
                        let d = Math.hypot(head.x - s.segments[0].x, head.y - s.segments[0].y);
                        if (d < closestDist && d < maxAggroDist) {
                            closestDist = d;
                            targetSnake = s;
                        }
                    }
                });

                if (targetSnake) {
                    let targetHead = targetSnake.segments[0];
                    let leadingFactor = closestDist * (currentDifficulty === 'EXPERT' ? 0.6 : 0.35);
                    steerX = targetHead.x + Math.cos(targetHead.angle) * leadingFactor;
                    steerY = targetHead.y + Math.sin(targetHead.angle) * leadingFactor;
                    if (closestDist < 250 && currentDifficulty !== 'EASY') this.isBoosting = true;
                } else {
                    let closestOrb = null;
                    let closestOrbDist = 350;

                    orbs.forEach(o => {
                        let d = Math.hypot(head.x - o.x, head.y - o.y);
                        if (d < closestOrbDist) {
                            closestOrbDist = d;
                            closestOrb = o;
                        }
                    });

                    if (closestOrb) {
                        steerX = closestOrb.x;
                        steerY = closestOrb.y;
                    } else {
                        if (Math.hypot(this.wanderTarget.x - head.x, this.wanderTarget.y - head.y) < 100) {
                            this.wanderTarget = { x: Math.random() * config.mapWidth, y: Math.random() * config.mapHeight };
                        }
                        steerX = this.wanderTarget.x;
                        steerY = this.wanderTarget.y;
                    }
                }

                if (currentDifficulty !== 'EASY') {
                    allSnakes.forEach(s => {
                        if (s === this || s.isProtected() || this.isProtected()) return;
                        if (s.segments.length > 0) {
                            let headDist = Math.hypot(head.x - s.segments[0].x, head.y - s.segments[0].y);
                            let approxLength = s.segments.length * config.segmentLength;
                            if (headDist > approxLength + 400) return;

                            for (let i = 0; i < s.segments.length; i += 6) {
                                let bodySeg = s.segments[i];
                                let d = Math.hypot(head.x - bodySeg.x, head.y - bodySeg.y);
                                if (d < evasionDist) {
                                    let escapeAngle = Math.atan2(head.y - bodySeg.y, head.x - bodySeg.x) + Math.PI / 2;
                                    steerX = head.x + Math.cos(escapeAngle) * 300;
                                    steerY = head.y + Math.sin(escapeAngle) * 300;
                                    this.isBoosting = true;
                                    break;
                                }
                            }
                        }
                    });
                }

                this.virtualCursor.x = steerX;
                this.virtualCursor.y = steerY;
            }

            updateTronAI(allSnakes) {
                let head = this.segments[0];
                let currentAngle = head.angle;
                let options = [ currentAngle, currentAngle - Math.PI / 2, currentAngle + Math.PI / 2 ];
                options = options.map(a => Math.atan2(Math.sin(a), Math.cos(a)));

                let targetX = config.mapWidth / 2;
                let targetY = config.mapHeight / 2;
                let closestOrb = null;
                let closestOrbDist = Infinity;

                orbs.forEach(o => {
                    let d = Math.hypot(head.x - o.x, head.y - o.y);
                    if (d < closestOrbDist) {
                        closestOrbDist = d;
                        closestOrb = o;
                    }
                });

                if (closestOrb) {
                    targetX = closestOrb.x;
                    targetY = closestOrb.y;
                }

                let angleToTarget = Math.atan2(targetY - head.y, targetX - head.x);
                let snappedTargetAngle = 0;
                if (angleToTarget > -Math.PI/4 && angleToTarget <= Math.PI/4) snappedTargetAngle = 0;
                else if (angleToTarget > Math.PI/4 && angleToTarget <= 3*Math.PI/4) snappedTargetAngle = Math.PI/2;
                else if (angleToTarget > 3*Math.PI/4 || angleToTarget <= -3*Math.PI/4) snappedTargetAngle = Math.PI;
                else snappedTargetAngle = -Math.PI/2;

                let bestDir = currentAngle;
                let maxSafeSteps = -1;
                let safeOptions = [];
                let stepStride = 16;
                let maxLookAheadDist = 240;

                if (currentDifficulty === 'EASY') maxLookAheadDist = 80;
                else if (currentDifficulty === 'MEDIUM') maxLookAheadDist = 160;
                else if (currentDifficulty === 'EXPERT') maxLookAheadDist = 450;

                for (let optAngle of options) {
                    let safeSteps = 0;
                    let lookAheadSteps = Math.ceil(maxLookAheadDist / stepStride);
                    let hitObstacle = false;

                    for (let step = 1; step <= lookAheadSteps; step++) {
                        let testX = head.x + Math.cos(optAngle) * (step * stepStride);
                        let testY = head.y + Math.sin(optAngle) * (step * stepStride);

                        if (testX < 40 || testX > config.mapWidth - 40 || testY < 40 || testY > config.mapHeight - 40) {
                            hitObstacle = true;
                            break;
                        }

                        for (let s of allSnakes) {
                            if (s.isProtected() || this.isProtected()) continue;
                            for (let i = 0; i < s.segments.length; i++) {
                                if (s === this && i < 4) continue; 
                                let seg = s.segments[i];
                                let rThresh = (s.baseRadius + this.baseRadius) * 0.85;
                                if (Math.hypot(testX - seg.x, testY - seg.y) < rThresh) {
                                    hitObstacle = true;
                                    break;
                                }
                            }
                            if (hitObstacle) break;
                        }
                        if (hitObstacle) break;
                        safeSteps++;
                    }

                    if (!hitObstacle && safeSteps === lookAheadSteps) {
                        safeOptions.push(optAngle);
                    }
                    if (safeSteps > maxSafeSteps) {
                        maxSafeSteps = safeSteps;
                        bestDir = optAngle;
                    }
                }

                if (safeOptions.length > 0) {
                    if (safeOptions.includes(snappedTargetAngle) && Math.random() < 0.65) {
                        bestDir = snappedTargetAngle;
                    } else if (safeOptions.includes(currentAngle) && Math.random() < 0.90) {
                        bestDir = currentAngle;
                    } else {
                        bestDir = safeOptions[Math.floor(Math.random() * safeOptions.length)];
                    }
                }

                if (bestDir !== currentAngle) {
                    if (bestDir === 0) this.nextDirection = 'RIGHT';
                    if (bestDir === Math.PI/2) this.nextDirection = 'DOWN';
                    if (bestDir === Math.PI) this.nextDirection = 'LEFT';
                    if (bestDir === -Math.PI/2) this.nextDirection = 'UP';
                }
            }

            move() {
                if (this.segments.length === 0) return;

                let head = this.segments[0];
                let currentAngle = head.angle;
                let targetAngle = currentAngle;

                this.actuallyBoosting = false;
                let speed = 3.6;

                if (currentGamemode === 'TRON') {
                    speed = 4.8;
                    if (this.isPlayer || this.isNetworkRemote) {
                        this.currentDirection = this.nextDirection;
                        if (this.currentDirection === 'UP') targetAngle = -Math.PI / 2;
                        if (this.currentDirection === 'DOWN') targetAngle = Math.PI / 2;
                        if (this.currentDirection === 'LEFT') targetAngle = Math.PI;
                        if (this.currentDirection === 'RIGHT') targetAngle = 0;
                    } else {
                        this.currentDirection = this.nextDirection;
                        if (this.currentDirection === 'UP') targetAngle = -Math.PI / 2;
                        if (this.currentDirection === 'DOWN') targetAngle = Math.PI / 2;
                        if (this.currentDirection === 'LEFT') targetAngle = Math.PI;
                        if (this.currentDirection === 'RIGHT') targetAngle = 0;
                    }
                } else {
                    if (this.isPlayer) {
                        let worldMouseX = mouse.x + camera.x;
                        let worldMouseY = mouse.y + camera.y;
                        targetAngle = Math.atan2(worldMouseY - head.y, worldMouseX - head.x);
                        this.isBoosting = hardwareInput.boost;
                    } else if (!this.isNetworkRemote) {
                        targetAngle = Math.atan2(this.virtualCursor.y - head.y, this.virtualCursor.x - head.x);
                    }

                    if (this.isBoosting && this.segments.length > config.minSegments) {
                        speed = 6.8;
                        this.actuallyBoosting = true;
                        if (Date.now() - this.lastBoostDrainTime > 160) {
                            this.segments.pop();
                            this.lastBoostDrainTime = Date.now();
                        }
                    }
                }

                if (this.isNetworkRemote) {
                    return; 
                }

                if (currentGamemode !== 'TRON') {
                    let angleDiff = targetAngle - currentAngle;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    
                    let turnRate = 0.09;
                    if (this.isBoosting) turnRate = 0.065;
                    head.angle = currentAngle + angleDiff * turnRate;
                } else {
                    head.angle = targetAngle;
                }

                let nextX = head.x + Math.cos(head.angle) * speed;
                let nextY = head.y + Math.sin(head.angle) * speed;

                if (nextX < 0) nextX = 0;
                if (nextX > config.mapWidth) nextX = config.mapWidth;
                if (nextY < 0) nextY = 0;
                if (nextY > config.mapHeight) nextY = config.mapHeight;

                let lastX = nextX;
                let lastY = nextY;
                let lastAngle = head.angle;

                let stride = currentGamemode === 'TRON' ? 4 : config.segmentLength;

                for (let i = 0; i < this.segments.length; i++) {
                    let seg = this.segments[i];
                    if (i === 0) {
                        seg.x = nextX;
                        seg.y = nextY;
                    } else {
                        if (currentGamemode === 'TRON') {
                            let oldX = seg.x;
                            let oldY = seg.y;
                            let oldAngle = seg.angle;
                            seg.x = lastX;
                            seg.y = lastY;
                            seg.angle = lastAngle;
                            lastX = oldX;
                            lastY = oldY;
                            lastAngle = oldAngle;
                        } else {
                            let dx = seg.x - lastX;
                            let dy = seg.y - lastY;
                            let dist = Math.hypot(dx, dy);
                            if (dist > stride) {
                                let angle = Math.atan2(dy, dx);
                                seg.x = lastX + Math.cos(angle) * stride;
                                seg.y = lastY + Math.sin(angle) * stride;
                                seg.angle = angle;
                            }
                            lastX = seg.x;
                            lastY = seg.y;
                        }
                    }
                }

                this.baseRadius = config.baseRadius + Math.floor(this.segments.length / 35);
            }

            draw() {
                if (this.segments.length === 0) return;

                let opacity = 1;
                if (this.isProtected()) {
                    opacity = 0.35 + Math.sin(Date.now() * 0.01) * 0.2;
                }

                ctx.save();
                if (!config.ultraOptimization && !this.isProtected()) {
                    ctx.shadowBlur = this.isPlayer ? 15 : 6;
                    ctx.shadowColor = `rgba(${this.startRGB.r}, ${this.startRGB.g}, ${this.startRGB.b}, 0.5)`;
                }

                for (let i = this.segments.length - 1; i >= 0; i--) {
                    let seg = this.segments[i];
                    let progress = i / this.segments.length;

                    let r = Math.round(this.startRGB.r + (this.endRGB.r - this.startRGB.r) * progress);
                    let g = Math.round(this.startRGB.g + (this.endRGB.g - this.startRGB.g) * progress);
                    let b = Math.round(this.startRGB.b + (this.endRGB.b - this.startRGB.b) * progress);

                    if (config.ultraOptimization && !this.isPlayer) {
                        r = 240; g = 240; b = 240;
                    }

                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${opacity})`;

                    let sizePercent = 1 - (progress * 0.45);
                    let rSize = this.baseRadius * sizePercent;

                    if (currentGamemode === 'TRON') {
                        rSize = this.baseRadius * 0.75;
                        ctx.fillRect(seg.x - rSize - camera.x, seg.y - rSize - camera.y, rSize * 2, rSize * 2);
                    } else {
                        ctx.beginPath();
                        ctx.arc(seg.x - camera.x, seg.y - camera.y, rSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                let head = this.segments[0];
                ctx.restore();

                ctx.save();
                ctx.fillStyle = config.ultraOptimization && !this.isPlayer ? '#ffffff' : '#ffffff';
                ctx.font = `bold 12px 'Segoe UI', Arial`;
                ctx.textAlign = 'center';
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#000000';
                ctx.fillText(this.name, head.x - camera.x, head.y - this.baseRadius - camera.y - 8);
                ctx.restore();
            }
        }

        function spawnOrbsFromSegments(segments, startRGB, endRGB) {
            segments.forEach((seg, index) => {
                if (index % 6 === 0) {
                    const progress = index / segments.length;
                    const r = Math.round(startRGB.r + (endRGB.r - startRGB.r) * progress);
                    const g = Math.round(startRGB.g + (endRGB.g - startRGB.g) * progress);
                    const b = Math.round(startRGB.b + (endRGB.b - startRGB.b) * progress);
                    orbs.push({
                        x: seg.x + (Math.random() - 0.5) * 20,
                        y: seg.y + (Math.random() - 0.5) * 20,
                        radius: Math.random() * 2 + 6,
                        color: `rgb(${r}, ${g}, ${b})`,
                        growthValue: currentGamemode === 'TRON' ? 1 : 3
                    });
                }
            });
        }

        function checkCollisions() {
            if (!player || player.segments.length === 0) return;
            let pHead = player.segments[0];

            for (let i = orbs.length - 1; i >= 0; i--) {
                let o = orbs[i];
                let d = Math.hypot(pHead.x - o.x, pHead.y - o.y);
                if (d < player.baseRadius + o.radius) {
                    spawnParticles(o.x, o.y, o.color);
                    for (let g = 0; g < o.growthValue; g++) {
                        let tail = player.segments[player.segments.length - 1];
                        player.segments.push({ x: tail.x, y: tail.y, angle: tail.angle });
                    }
                    orbs.splice(i, 1);
                }
            }

            snakes.forEach(s => {
                if (s === player || s.segments.length === 0) return;
                for (let i = orbs.length - 1; i >= 0; i--) {
                    let o = orbs[i];
                    let sHead = s.segments[0];
                    if (Math.hypot(sHead.x - o.x, sHead.y - o.y) < s.baseRadius + o.radius) {
                        for (let g = 0; g < o.growthValue; g++) {
                            let tail = s.segments[s.segments.length - 1];
                            s.segments.push({ x: tail.x, y: tail.y, angle: tail.angle });
                        }
                        orbs.splice(i, 1);
                    }
                }
            });

            if (!player.isProtected()) {
                for (let s of snakes) {
                    if (s === player || s.segments.length === 0) continue;
                    if (s.isProtected()) continue;

                    let startIdx = 0;
                    if (s.isNetworkRemote) startIdx = 0; 

                    for (let i = startIdx; i < s.segments.length; i++) {
                        if (s === player && i < 4) continue; 
                        let seg = s.segments[i];
                        let rThresh = pHead.baseRadius + s.baseRadius;
                        if (currentGamemode === 'TRON') rThresh = (pHead.baseRadius + s.baseRadius) * 0.75;

                        if (Math.hypot(pHead.x - seg.x, pHead.y - seg.y) < rThresh * 0.85) {
                            handlePlayerDeath();
                            return;
                        }
                    }
                }
            }

            for (let s of snakes) {
                if (s === player || s.segments.length === 0 || s.isProtected()) continue;

                let sHead = s.segments[0];
                let died = false;

                for (let other of snakes) {
                    if (other.segments.length === 0 || other.isProtected()) continue;

                    let startIdx = 0;
                    for (let i = startIdx; i < other.segments.length; i++) {
                        if (other === s && i < 4) continue;
                        let seg = other.segments[i];
                        let rThresh = s.baseRadius + other.baseRadius;
                        if (currentGamemode === 'TRON') rThresh = (s.baseRadius + other.baseRadius) * 0.75;

                        if (Math.hypot(sHead.x - seg.x, seg.y - seg.y) < rThresh * 0.85) {
                            died = true;
                            break;
                        }
                    }
                    if (died) break;
                }

                if (died) {
                    dropOrbsFromDeath(s);
                    if (isMultiplayerMode && socket && socket.readyState === 1 && s.isNetworkRemote) {
                    } else {
                        let idx = snakes.indexOf(s);
                        if (idx !== -1) snakes.splice(idx, 1);
                        setTimeout(() => {
                            if (gameState === 'PLAYING') {
                                const randomName = npcNames[Math.floor(Math.random() * npcNames.length)] + " [" + Math.floor(Math.random()*900+100) + "]";
                                snakes.push(new Snake(Math.random()*config.mapWidth, Math.random()*config.mapHeight, false, randomName));
                            }
                        }, 2500);
                    }
                }
            }
        }

        function handlePlayerDeath() {
            if (isMultiplayerMode && socket && socket.readyState === 1) {
                socket.send(JSON.stringify({
                    type: 'death',
                    segments: player.segments,
                    startRGB: player.startRGB,
                    endRGB: player.endRGB
                }));
            }

            dropOrbsFromDeath(player);
            spawnParticles(player.segments[0].x, player.segments[0].y, '#ff3232');
            
            gameState = 'GAMEOVER';
            deathStats.innerText = `Final Score: ${player.segments.length} segments collected`;
            
            deathOverlay.classList.remove('hidden');
            gameHud.style.display = 'none';
            gameLeaderboard.style.display = 'none';
            
            let idx = snakes.indexOf(player);
            if (idx !== -1) snakes.splice(idx, 1);
            player = null;
        }

        function syncNetworkPlayersData() {
            for (let id in networkPlayers) {
                if (id === myNetworkId) continue; 
                let data = networkPlayers[id];
                let remoteSnake = snakes.find(s => s.networkId === id);

                if (!remoteSnake) {
                    remoteSnake = new Snake(0, 0, false, data.name);
                    remoteSnake.isNetworkRemote = true;
                    remoteSnake.networkId = id;
                    snakes.push(remoteSnake);
                }

                remoteSnake.startRGB = data.startRGB;
                remoteSnake.endRGB = data.endRGB;
                remoteSnake.baseRadius = data.baseRadius;
                remoteSnake.spawnTime = data.spawnTime;
                remoteSnake.actuallyBoosting = data.actuallyBoosting;
                remoteSnake.segments = data.segments;
            }

            for (let i = snakes.length - 1; i >= 0; i--) {
                let s = snakes[i];
                if (s.isNetworkRemote && !networkPlayers[s.networkId]) {
                    snakes.splice(i, 1);
                }
            }
        }

        function localSnakeInit(name, headHex, tailHex) {
            orbs = [];
            particles = [];
            snakes = [];

            player = new Snake(config.mapWidth / 2, config.mapHeight / 2, true, name);
            player.startRGB = hexToRgb(headHex);
            player.endRGB = hexToRgb(tailHex);
            snakes.push(player);

            if (!isMultiplayerMode) {
                for(let i=0; i<config.maxNPCs; i++) {
                    const randomName = npcNames[Math.floor(Math.random() * npcNames.length)] + " [" + Math.floor(Math.random()*900+100) + "]";
                    snakes.push(new Snake(Math.random()*config.mapWidth, Math.random()*config.mapHeight, false, randomName));
                }
            }

            maintainPassiveOrbs();
            gameState = 'PLAYING';
        }

        let networkPlayers = {};

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (config.motionBlur && gameState === 'PLAYING') {
                ctx.fillStyle = 'rgba(4, 4, 6, 0.28)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (player && player.segments.length > 0) {
                let pHead = player.segments[0];
                let targetCamX = pHead.x - (canvas.width / 2) / logicalScale;
                let targetCamY = pHead.y - (canvas.height / 2) / logicalScale;
                
                camera.x += (targetCamX - camera.x) * 0.1;
                camera.y += (targetCamY - camera.y) * 0.1;

                let desiredScale = 1 - (player.segments.length * 0.0006);
                if (desiredScale < 0.55) desiredScale = 0.55;
                logicalScale += (desiredScale - logicalScale) * 0.05;
            } else {
                camera.x = 0;
                camera.y = 0;
                logicalScale = 1;
            }

            ctx.save();
            ctx.scale(logicalScale, logicalScale);

            drawHexGrid();
            drawArenaBoundaries();

            if (gameState === 'PLAYING' || gameState === 'GAMEOVER' || gameState === 'SETTINGS') {
                maintainPassiveOrbs();

                for (let i = orbs.length - 1; i >= 0; i--) {
                    let o = orbs[i];
                    ctx.save();
                    ctx.fillStyle = o.color;
                    if (!config.ultraOptimization) {
                        ctx.shadowBlur = o.radius * 1.5;
                        ctx.shadowColor = o.color;
                    }
                    ctx.beginPath();
                    ctx.arc(o.x - camera.x, o.y - camera.y, o.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                snakes.forEach(s => {
                    s.updateAI(snakes);
                    s.move();
                    s.draw();
                });

                if (gameState === 'PLAYING') {
                    checkCollisions();
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha -= 0.02;
                    if (p.alpha <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x - camera.x, p.y - camera.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            ctx.restore();

            if (gameState === 'PLAYING' && player) {
                gameHud.style.display = 'block';
                gameHud.innerText = `Score: ${player.segments.length} | Size Radius: ${player.baseRadius} | Entities: ${snakes.length}`;
                
                if (isMultiplayerMode && socket && socket.readyState === 1) {
                    socket.send(JSON.stringify({
                        type: 'sync',
                        segments: player.segments,
                        baseRadius: player.baseRadius,
                        spawnTime: player.spawnTime,
                        actuallyBoosting: player.actuallyBoosting
                    }));
                }
            }
            
            updateLeaderboard();
            if (gameState === 'PLAYING') drawMinimap();

            requestAnimationFrame(gameLoop);
        }

        // Click Logic Setup
        document.getElementById('startBtn').addEventListener('click', () => {
            isMultiplayerMode = false;
            if (socket) { socket.close(); socket = null; }
            menuOverlay.classList.add('hidden');
            
            const nickname = document.getElementById('nickname').value || 'Anonymous';
            localSnakeInit(nickname, document.getElementById('headColor').value, document.getElementById('tailColor').value);
        });

        document.getElementById('lanBtn').addEventListener('click', () => {
            // 1. Automatically switch between secure wss:// (Render) and standard ws:// (Local)
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            
            // 2. Fall back to your input field or localhost if running locally on your PC
            let host = window.location.host;
            if (!host || host.startsWith('127.0.0.1') || host.startsWith('localhost') || window.location.protocol === 'file:') {
                host = lanIpInput.value || 'localhost:3000';
            }
            
            const serverUrl = protocol + host;
            console.log(`📡 Attempting connection to global arena at: ${serverUrl}`);

            socket = new WebSocket(serverUrl);

            socket.onopen = () => {
                console.log("⚡ Connected into the multiplayer cluster successfully!");
                isMultiplayerMode = true;
                
                const nameChoice = document.getElementById('nickname').value || 'Anonymous';
                localSnakeInit(nameChoice, document.getElementById('headColor').value, document.getElementById('tailColor').value);

                const joinPacket = {
                    type: 'join',
                    name: nameChoice,
                    startRGB: hexToRgb(document.getElementById('headColor').value),
                    endRGB: hexToRgb(document.getElementById('tailColor').value)
                };
                socket.send(JSON.stringify(joinPacket));
                
                menuOverlay.classList.add('hidden');
                gameHud.style.display = 'block';
                gameState = 'PLAYING';
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'init') {
                        myNetworkId = data.id;
                        if (player) player.networkId = myNetworkId;
                    }
                    
                    if (data.type === 'update') {
                        networkPlayers = data.players;
                        syncNetworkPlayersData();
                    }

                    if (data.type === 'spawnDeathOrbs') {
                        spawnOrbsFromSegments(data.segments, data.startRGB, data.endRGB);
                    }
                } catch (e) {
                    console.error("Failed processing cluster payloads:", e);
                }
            };

            socket.onclose = () => {
                console.warn("❌ Disconnected from server cluster.");
                if (gameState === 'PLAYING' && isMultiplayerMode) {
                    isMultiplayerMode = false;
                    gameState = 'MENU';
                    menuOverlay.classList.remove('hidden');
                    gameHud.style.display = 'none';
                    gameLeaderboard.style.display = 'none';
                    alert("Connection to the server was lost!");
                }
            };
        });

        document.getElementById('respawnBtn').addEventListener('click', () => {
            deathOverlay.classList.add('hidden');
            const nickname = document.getElementById('nickname').value || 'Anonymous';
            
            if (isMultiplayerMode) {
                document.getElementById('lanBtn').click();
            } else {
                localSnakeInit(nickname, document.getElementById('headColor').value, document.getElementById('tailColor').value);
            }
        });

        document.getElementById('backToMenuBtn').addEventListener('click', () => {
            deathOverlay.classList.add('hidden');
            menuOverlay.classList.remove('hidden');
            gameState = 'MENU';
            isMultiplayerMode = false;
            if (socket) { socket.close(); socket = null; }
        });

        modeDefaultBtn.addEventListener('click', () => {
            currentGamemode = 'DEFAULT';
            modeDefaultBtn.classList.add('active-diff');
            modeTronBtn.classList.remove('active-diff');
        });

        modeTronBtn.addEventListener('click', () => {
            currentGamemode = 'TRON';
            modeTronBtn.classList.add('active-diff');
            modeDefaultBtn.classList.remove('active-diff');
        });

        document.querySelectorAll('[data-diff]').forEach(button => {
            button.addEventListener('click', (e) => {
                document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('active-diff'));
                e.target.classList.add('active-diff');
                currentDifficulty = e.target.getAttribute('data-diff');
            });
        });

        blurToggle.addEventListener('change', (e) => {
            config.motionBlur = e.target.checked;
        });

        ultraOptToggle.addEventListener('change', (e) => {
            config.ultraOptimization = e.target.checked;
        });

        document.querySelectorAll('.settingsOpenBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                priorSettingsState = gameState; 
                menuOverlay.classList.add('hidden');
                deathOverlay.classList.add('hidden');
                settingsOverlay.classList.remove('hidden');
                gameState = 'SETTINGS';
            });
        });

        document.getElementById('settingsCloseBtn').addEventListener('click', () => {
            settingsOverlay.classList.add('hidden');
            gameState = priorSettingsState; 

            if (gameState === 'MENU') {
                menuOverlay.classList.remove('hidden');
            } else if (gameState === 'GAMEOVER') {
                deathOverlay.classList.remove('hidden');
            }
        });

        // Start running loops immediately
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
